<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIYABI V6</title>  <style>
    *{
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      margin:0;
      background:#080808;
      color:white;
    }

    header{
      background:#b00000;
      padding:20px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      box-shadow:0 0 20px red;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#111;
      border:1px solid #ff3333;
      border-radius:15px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 0 15px rgba(255,0,0,.3);
    }

    .avatar{
      width:90px;
      height:90px;
      margin:auto;
      border-radius:50%;
      background:#600000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      box-shadow:0 0 25px red;
    }

    .status{
      text-align:center;
      margin-top:15px;
      font-size:16px;
    }

    .dot{
      width:12px;
      height:12px;
      display:inline-block;
      border-radius:50%;
      background:#00ff66;
      box-shadow:
        0 0 5px #00ff66,
        0 0 15px #00ff66,
        0 0 30px #00ff66;
      animation:pulse 1s infinite;
      margin-right:8px;
    }

    @keyframes pulse{
      50%{
        transform:scale(1.7);
        opacity:.3;
      }
    }

    input,button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-size:16px;
    }

    input{
      background:#222;
      color:white;
    }

    button{
      background:#d00000;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .info{
      margin-top:15px;
      background:#080808;
      padding:15px;
      border-radius:10px;
      color:#00ff99;
    }

    .menu{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .menu button{
      margin-top:0;
    }
  </style></head><body><header>
  ⚡ MIYABI - NEBULA
</header><div class="container">  <div class="card">
    <div class="avatar">😈</div><div class="status">
  <span class="dot"></span>
  <span id="state">ONLINE</span>
</div>

  </div>  <div class="card">
    <h3>🔐 ACCESS REQUIRED!</h3><input id="pairID" placeholder="Masukkan Pairing ID">

<button onclick="connect()">
  ACCESS GRANTED
</button>

<div class="info" id="result">
  Waiting...
</div>

  </div>  <div class="card">
    <h3>📂 MENU</h3><div class="menu">
  <button onclick="openSetup()">
    ⚙️ Setup Perangkat
  </button>

  <button onclick="openChat()">
    💬 Chat Parent
  </button>
</div>

  </div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getDatabase,
  ref,
  get,
  update,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",
  authDomain: "rat-jancok.firebaseapp.com",
  databaseURL: "https://rat-jancok-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rat-jancok",
  storageBucket: "rat-jancok.firebasestorage.app",
  messagingSenderId: "832199244613",
  appId: "1:832199244613:web:d40428c4fd6e73d37d1c2c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function getBattery(){
  if(navigator.getBattery){
    const b = await navigator.getBattery();
    return Math.round(b.level * 100) + "%";
  }
  return "Tidak tersedia";
}

window.connect = async function(){

  const id = document.getElementById("pairID").value.trim();

  if(!id){
    alert("Masukkan Pairing ID");
    return;
  }

  const session = ref(db, "sessions/" + id);
  const snap = await get(session);

  if(!snap.exists()){
    document.getElementById("result").innerHTML = "❌ Pairing ID tidak ditemukan";
    return;
  }

  const deviceInfo = {
    browser: navigator.userAgent,
    battery: await getBattery(),
    screen: screen.width + "x" + screen.height,
    status: "Online",
    lastSeen: Date.now()
  };

  await update(session, {
    connected: true,
    deviceInfo: deviceInfo
  });

  onDisconnect(session).update({
    connected: false
  });

  document.getElementById("state").innerHTML = "ONLINE";
  document.getElementById("result").innerHTML = "✅ Berhasil terhubung ke Parent";
};

window.openSetup = function(){
  alert(
    "Setup Perangkat akan meminta izin resmi browser untuk fitur seperti lokasi, kamera, mikrofon, dan notifikasi jika Anda memilih mengaktifkannya."
  );
};

window.openChat = function(){
  alert("Fitur chat realtime bisa ditambahkan pada tahap berikutnya.");
};
</script></body>
</html>
