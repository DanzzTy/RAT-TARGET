<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>DARKVERSE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Share Tech Mono',monospace;
}

body{
margin:0;
height:100vh;
background:radial-gradient(circle,#350000,#050505 65%);
color:white;
}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.glitch{
font-family:Orbitron;
font-size:45px;
font-weight:900;
letter-spacing:5px;
color:#ff1744;
animation:glitch .8s infinite;
}

@keyframes glitch{
0%{text-shadow:3px 0 cyan;}
50%{text-shadow:-3px 0 white;}
100%{text-shadow:3px 0 cyan;}
}

.card{
width:90%;
max-width:400px;
background:#100810;
padding:25px;
border-radius:25px;
border:1px solid #ff1744;
box-shadow:0 0 30px #ff1744;
text-align:center;
}

.avatar{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:#25000d;
display:flex;
align-items:center;
justify-content:center;
font-family:Orbitron;
font-size:30px;
color:#ff1744;
}

.username{
font-family:Orbitron;
font-size:22px;
margin-top:15px;
}

.role{
color:#ffd54f;
}

.status{
margin-top:20px;
}

.dot{
display:inline-block;
width:13px;
height:13px;
border-radius:50%;
background:#00ff66;
box-shadow:0 0 15px #00ff66;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.6);
opacity:.4;
}
}

input,button{

width:100%;
padding:14px;
margin-top:15px;
border-radius:12px;
}

input{
background:#050505;
border:1px solid #555;
color:white;
}

button{
background:#ff1744;
border:0;
color:white;
font-weight:bold;
}

.info{
margin-top:15px;
color:#00f3ff;
}

#permission{
display:none;
}

.permission{
border:1px solid #00f3ff;
padding:15px;
border-radius:15px;
color:#00f3ff;
margin-top:15px;
}

</style>

</head>

<body>


<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>


<div class="page" id="home">

<div class="glitch">
DARKVERSE
</div>


<div class="card">

<div class="avatar">
DV
</div>


<div class="username">
Danzz
</div>

<div class="role">
OWNER
</div>


<div class="status">

<span class="dot"></span>

ONLINE

</div>


<input id="pairID" placeholder="PAIRING ID">


<button onclick="connect()">
CONNECT
</button>


<div class="info" id="result">
Waiting...
</div>


</div>

</div>



<div class="page" id="permission">

<div class="glitch">
DARKVERSE
</div>


<div class="card">

<h2>
PERMISSION REQUIRED
</h2>


<div class="permission">

ACCESS CONNECTED

<br><br>

Aktifkan izin melalui sistem perangkat jika diperlukan.

</div>


<button onclick="back()">
BACK
</button>


</div>

</div>




<script type="module">


import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getDatabase,
ref,
get,
update,
onDisconnect

}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";



const firebaseConfig={

apiKey:"AIzaSyCnGnqV6fKvO3XDLBucrsIYPjGuafTun7g",

authDomain:"rat-jancok.firebaseapp.com",

databaseURL:"https://rat-jancok-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"rat-jancok",

storageBucket:"rat-jancok.firebasestorage.app",

messagingSenderId:"832199244613",

appId:"1:832199244613:web:d40428c4fd6e73d37d1c2c"

};



const app=initializeApp(firebaseConfig);

const db=getDatabase(app);



async function getBattery(){

if(navigator.getBattery){

let b=await navigator.getBattery();

return Math.round(b.level*100)+"%";

}

return "-";

}



window.connect=async()=>{


let id=document
.getElementById("pairID")
.value.trim();



if(!id){

alert("Masukkan Pairing ID");

return;

}



let session=ref(db,"sessions/"+id);


let snap=await get(session);



if(!snap.exists()){

document
.getElementById("result")
.innerHTML="PAIR ID INVALID";

return;

}



let info={

name:"DARKVERSE CHILD",

user:"Danzz",

browser:navigator.userAgent,

screen:
screen.width+"x"+screen.height,

battery:
await getBattery(),

online:true,

time:Date.now()

};



await update(session,{

connected:true,

deviceInfo:info

});



onDisconnect(session)
.update({

connected:false

});



document
.getElementById("music")
.play()
.catch(()=>{});



document
.getElementById("home")
.style.display="none";


document
.getElementById("permission")
.style.display="flex";


};



window.back=()=>{


document
.getElementById("permission")
.style.display="none";


document
.getElementById("home")
.style.display="flex";


};


</script>


</body>
</html>
