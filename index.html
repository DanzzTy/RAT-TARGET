<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DEVONAX CHILD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

:root{
--bg:#070707;
--card:#131313;
--border:#2e2e2e;
--red:#ff2020;
--text:#ffffff;
}

body{

background:var(--bg);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:#fff;

}

body::before{

content:"";

position:fixed;

inset:0;

background:

radial-gradient(circle at top left,#ff202015,transparent 35%),

radial-gradient(circle at bottom right,#ff202015,transparent 35%);

pointer-events:none;

}

.grid{

position:fixed;

inset:0;

opacity:.05;

background-image:

linear-gradient(#ff2020 1px,transparent 1px),

linear-gradient(90deg,#ff2020 1px,transparent 1px);

background-size:35px 35px;

pointer-events:none;

}

.box{

width:92%;

max-width:410px;

background:var(--card);

border:1px solid var(--border);

border-radius:28px;

padding:30px 25px;

box-shadow:0 0 25px rgba(255,0,0,.15);

}

.logo{

display:flex;

justify-content:center;

margin-bottom:18px;

}

.logo img{

width:72px;

height:72px;

border-radius:50%;

object-fit:cover;

border:2px solid #ff2020;

box-shadow:0 0 20px rgba(255,0,0,.35);

}

.title{

text-align:center;

font-size:28px;

font-weight:800;

letter-spacing:4px;

margin-bottom:6px;

}

.subtitle{

text-align:center;

font-size:11px;

letter-spacing:2px;

color:#999;

margin-bottom:28px;

}

.label{

font-size:12px;

letter-spacing:2px;

color:#ff6666;

margin-bottom:10px;

}

.input{

width:100%;

height:56px;

border-radius:16px;

border:1px solid #333;

background:#1a1a1a;

padding:0 18px;

outline:none;

color:#fff;

font-size:15px;

letter-spacing:3px;

text-transform:uppercase;

transition:.25s;

}

.input:focus{

border-color:#ff2020;

box-shadow:0 0 18px rgba(255,0,0,.25);

}

.btn{

margin-top:20px;

width:100%;

height:56px;

border:none;

border-radius:16px;

background:linear-gradient(180deg,#ff3030,#8b0000);

color:#fff;

font-size:13px;

font-weight:700;

letter-spacing:2px;

cursor:pointer;

transition:.25s;

}

.btn:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(255,0,0,.30);

}

.status{

margin-top:18px;

text-align:center;

font-size:12px;

color:#888;

min-height:18px;

}

.footer{

margin-top:25px;

text-align:center;

font-size:10px;

color:#555;

letter-spacing:2px;

}

</style>

</head>

<body>

<div class="grid"></div>

<div class="box">

<div class="logo">

<img src="img/logo.png" alt="Logo">

</div>

<div class="title">

DARKVERSE V5

</div>

<div class="subtitle">

MODERN AUTENTICATION SYSTEM

</div>

<div class="label">

ACCESS ID REQUIRED! 

</div>

<input
id="pairingInput"
class="input"
type="text"
maxlength="20"
placeholder="XVAFSU819HDT"
autocomplete="off">

<button
id="connectBtn"
class="btn">

ACCESS GRANTED

</button>

<div
id="status"
class="status">

Masukkan ID akses dari owner.

</div>

<div class="footer">

DARKVERSE NEW EDITION

</div>

  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getDatabase,
ref,
get,
update,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyAV5qFI5J0cZd0eg2Q6mhEZ0KEiR1URv1c",

authDomain:"project-coding-gabut.firebaseapp.com",

databaseURL:"https://project-coding-gabut-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"project-coding-gabut",

storageBucket:"project-coding-gabut.firebasestorage.app",

messagingSenderId:"234910334669",

appId:"1:234910334669:web:5203c9e9ce22a596f2b384"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const input=document.getElementById("pairingInput");

const status=document.getElementById("status");

const button=document.getElementById("connectBtn");

button.onclick=async()=>{

const pairingId=input.value.trim().toUpperCase();

if(pairingId.length<8){

status.textContent="Pairing ID tidak valid.";

return;

}

status.textContent="Memverifikasi...";

const snap=await get(ref(db,"pairing/"+pairingId));

if(!snap.exists()){

status.textContent="Pairing ID tidak ditemukan.";

return;

}

await update(ref(db,"pairing/"+pairingId),{

connected:true,

deviceName:navigator.userAgent,

platform:navigator.platform,

language:navigator.language,

lastSeen:Date.now()

});

localStorage.setItem("pairingId",pairingId);

status.textContent="Berhasil terhubung.";

setTimeout(()=>{

location.href="permissions.html";

},1000);

};

</script>

</body>
</html>
